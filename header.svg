<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>

    <!-- KHAOS: primordial void -->
    <linearGradient id="khaos" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#04000e"/>
      <stop offset="30%"  stop-color="#0c0022"/>
      <stop offset="60%"  stop-color="#160038"/>
      <stop offset="100%" stop-color="#06001a"/>
    </linearGradient>

    <!-- HEKATE: neon torch at center -->
    <radialGradient id="hekate" cx="50%" cy="42%" r="48%">
      <stop offset="0%"   stop-color="#7722cc" stop-opacity="0.55"/>
      <stop offset="40%"  stop-color="#3a0880" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- NYX: left veil -->
    <radialGradient id="nyx-l" cx="5%" cy="50%" r="38%">
      <stop offset="0%"   stop-color="#220055" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- NYX: right veil -->
    <radialGradient id="nyx-r" cx="95%" cy="50%" r="38%">
      <stop offset="0%"   stop-color="#180044" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- GAIA: golden horizon -->
    <linearGradient id="gaia" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1a0800" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#7a5010" stop-opacity="0.5"/>
      <stop offset="50%"  stop-color="#c89428" stop-opacity="0.9"/>
      <stop offset="75%"  stop-color="#7a5010" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1a0800" stop-opacity="0"/>
    </linearGradient>

    <!-- Top depth -->
    <linearGradient id="top-fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>

    <!-- NEON glow filter — main name -->
    <filter id="neon-name" x="-15%" y="-40%" width="130%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"  result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow — subtitle + typing -->
    <filter id="neon-soft" x="-10%" y="-60%" width="120%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- TYPEWRITER clip — EN phrase -->
    <clipPath id="tw-en">
      <rect x="110" y="220" height="36">
        <animate attributeName="width"
          values="0;580;580;0;0"
          keyTimes="0;0.40;0.65;0.82;1"
          calcMode="linear"
          dur="9s"
          repeatCount="indefinite"/>
      </rect>
    </clipPath>

    <!-- TYPEWRITER clip — PT phrase -->
    <clipPath id="tw-pt">
      <rect x="110" y="220" height="36">
        <animate attributeName="width"
          values="0;0;0;580;580;0;0"
          keyTimes="0;0.65;0.82;0.92;1;1;1"
          calcMode="linear"
          dur="18s"
          repeatCount="indefinite"/>
      </rect>
    </clipPath>

    <style>
      .sa { animation: sa 3.1s ease-in-out infinite alternate; }
      .sb { animation: sb 4.8s ease-in-out infinite alternate; }
      .sc { animation: sc 2.9s ease-in-out infinite alternate; }
      .sd { animation: sd 5.3s ease-in-out infinite alternate; }
      .se { animation: se 3.7s ease-in-out infinite alternate; }
      .sf { animation: sf 6.1s ease-in-out infinite alternate; }
      .sg { animation: sg 2.6s ease-in-out infinite alternate; }
      .sh { animation: sh 4.4s ease-in-out infinite alternate; }
      .hk { animation: hk  5s  ease-in-out infinite alternate; }

      @keyframes sa { 0%{opacity:.05} 100%{opacity:.90} }
      @keyframes sb { 0%{opacity:.10} 100%{opacity:.75} }
      @keyframes sc { 0%{opacity:.03} 100%{opacity:.95} }
      @keyframes sd { 0%{opacity:.07} 100%{opacity:.70} }
      @keyframes se { 0%{opacity:.12} 100%{opacity:.85} }
      @keyframes sf { 0%{opacity:.04} 100%{opacity:.80} }
      @keyframes sg { 0%{opacity:.08} 100%{opacity:.98} }
      @keyframes sh { 0%{opacity:.02} 100%{opacity:.65} }
      @keyframes hk { 0%{opacity:.28} 100%{opacity:.58} }
    </style>
  </defs>

  <!-- === KHAOS: the void === -->
  <rect width="800" height="280" fill="url(#khaos)"/>

  <!-- === HEKATE: torchlight === -->
  <ellipse class="hk" cx="400" cy="115" rx="350" ry="130" fill="url(#hekate)"/>

  <!-- === NYX: night veils === -->
  <rect width="800" height="280" fill="url(#nyx-l)"/>
  <rect width="800" height="280" fill="url(#nyx-r)"/>
  <rect width="800" height="280" fill="url(#top-fade)"/>

  <!-- === NYX: star field — upper === -->
  <circle class="sc" cx="38"  cy="14"  r="1.1" fill="#cc88ff"/>
  <circle class="sa" cx="82"  cy="38"  r="0.7" fill="#ffffff"/>
  <circle class="sb" cx="131" cy="9"   r="1.4" fill="#eeddff"/>
  <circle class="sf" cx="169" cy="52"  r="0.6" fill="#bb88ff"/>
  <circle class="sd" cx="218" cy="21"  r="1.2" fill="#ffffff"/>
  <circle class="sg" cx="261" cy="44"  r="0.8" fill="#dd99ff"/>
  <circle class="sa" cx="304" cy="16"  r="1.5" fill="#eeddff"/>
  <circle class="se" cx="347" cy="37"  r="0.7" fill="#ffffff"/>
  <circle class="sb" cx="392" cy="11"  r="1.0" fill="#cc88ff"/>
  <circle class="sc" cx="438" cy="29"  r="0.9" fill="#eeddff"/>
  <circle class="sh" cx="481" cy="48"  r="1.3" fill="#ffffff"/>
  <circle class="sd" cx="526" cy="18"  r="0.6" fill="#dd99ff"/>
  <circle class="sf" cx="570" cy="42"  r="1.2" fill="#bb88ff"/>
  <circle class="sg" cx="614" cy="13"  r="0.8" fill="#ffffff"/>
  <circle class="se" cx="658" cy="35"  r="1.4" fill="#cc88ff"/>
  <circle class="sa" cx="700" cy="22"  r="0.7" fill="#eeddff"/>
  <circle class="sb" cx="744" cy="46"  r="1.1" fill="#ffffff"/>
  <circle class="sc" cx="776" cy="28"  r="0.9" fill="#dd99ff"/>

  <!-- === NYX: star field — lower (sparse, below Gaia) === -->
  <circle class="sd" cx="55"  cy="190" r="0.7" fill="#cc88ff"/>
  <circle class="sf" cx="142" cy="210" r="0.6" fill="#ffffff"/>
  <circle class="sc" cx="648" cy="195" r="0.8" fill="#eeddff"/>
  <circle class="sa" cx="735" cy="215" r="0.6" fill="#cc88ff"/>
  <circle class="sb" cx="770" cy="200" r="0.7" fill="#ffffff"/>

  <!-- === GAIA: earth horizon === -->
  <rect x="80"  y="158" width="640" height="0.8" fill="url(#gaia)"/>
  <rect x="160" y="161" width="480" height="0.3" fill="url(#gaia)" opacity="0.4"/>

  <!-- === NAME: neon glow layer + crisp layer === -->
  <text x="400" y="120"
    text-anchor="middle"
    font-family="Georgia, 'Palatino Linotype', serif"
    font-size="33" font-weight="400" letter-spacing="13"
    fill="#cc55ff" opacity="0.6"
    filter="url(#neon-name)"
  >ANDRE DJM</text>
  <text x="400" y="120"
    text-anchor="middle"
    font-family="Georgia, 'Palatino Linotype', serif"
    font-size="33" font-weight="400" letter-spacing="13"
    fill="#f8f0ff" opacity="0.97"
  >ANDRE DJM</text>

  <!-- === SUBTITLE === -->
  <text x="400" y="143"
    text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="10.5" letter-spacing="5"
    fill="#aa44ee" opacity="0.95"
    filter="url(#neon-soft)"
  >ENGINEER · BUILDER · DJ</text>

  <!-- === TYPEWRITER: EN phrase === -->
  <text clip-path="url(#tw-en)"
    x="110" y="250"
    font-family="'Courier New', monospace"
    font-size="13" letter-spacing="1.8"
    fill="#f8f0ff" opacity="0.92"
    filter="url(#neon-soft)"
  >Engineer by day. DJ by night. Always building something.</text>

  <!-- === TYPEWRITER: PT phrase (offset cycle) === -->
  <text clip-path="url(#tw-pt)"
    x="110" y="250"
    font-family="'Courier New', monospace"
    font-size="13" letter-spacing="1.8"
    fill="#f8f0ff" opacity="0.92"
    filter="url(#neon-soft)"
  >Engenheiro de dia. DJ de noite. Sempre construindo algo.</text>

  <!-- === CURSOR: blinking neon === -->
  <rect x="108" y="236" width="2" height="17" fill="#cc55ff" opacity="0.95">
    <animate attributeName="x"
      values="108;680;108;680;108"
      keyTimes="0;0.40;0.41;0.92;1"
      dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="1;0;1" dur="0.85s" repeatCount="indefinite"/>
  </rect>

</svg>
