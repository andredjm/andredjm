name: Weekly insight — AI agent

on:
  schedule:
    - cron: '0 10 * * 1'  # Every Monday at 10am UTC
  workflow_dispatch:       # Allow manual trigger anytime

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install OpenAI SDK
        run: pip install openai

      - name: Generate insight via GitHub Models
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import os
          import datetime
          import re
          from openai import OpenAI

          client = OpenAI(
              base_url="https://models.inference.ai.azure.com",
              api_key=os.environ["GITHUB_TOKEN"],
          )

          today = datetime.date.today()
          today_str = today.strftime("%Y-%m-%d")
          next_week_str = (today + datetime.timedelta(days=7)).strftime("%Y-%m-%d")

          response = client.chat.completions.create(
              model="gpt-4o",
              max_tokens=180,
              messages=[{
                  "role": "user",
                  "content": """You are writing a weekly insight for Andre DJM's GitHub profile.

          Context about Andre:
          - Full-stack engineer (NestJS, Next.js, TypeScript, Docker, PostgreSQL, Redis, AWS)
          - Builds SaaS products: All Tracking Done (logistics platform), Treinero (personal trainer marketplace), ChatFlow (messaging automation)
          - Also a techno/house/underground DJ
          - Thinks in systems, obsessed with shipping things that work at scale
          - Uses AI tools creatively in his workflow

          Write ONE sharp, original thought (2-4 sentences max) that Andre might be sitting with this week.
          It could be about: software architecture, product building, the intersection of creativity and engineering, systems thinking, the DJ/engineer duality, or AI in product workflows.

          Rules:
          - Sound like a real human thought, not a motivational quote
          - Be specific and concrete, not generic
          - No clichés. No "passionate about". No "leverage synergies".
          - Return only the raw text, no quotes, no attribution.
          """
              }]
          )

          insight = response.choices[0].message.content.strip()

          with open("README.md", "r") as f:
              content = f.read()

          new_block = (
              f"<!-- agent:start -->\n"
              f"<!-- Updated by AI agent · {today_str} · next: {next_week_str} -->\n"
              f"\n"
              f"### This week / Esta semana\n"
              f"\n"
              f"> {insight}\n"
              f"\n"
              f"<!-- agent:end -->"
          )

          updated = re.sub(
              r'<!-- agent:start -->.*?<!-- agent:end -->',
              new_block,
              content,
              flags=re.DOTALL
          )

          with open("README.md", "w") as f:
              f.write(updated)

          print(f"✓ Insight: {insight[:80]}...")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "ai-agent[bot]"
          git config user.email "ai-agent@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "agent: weekly insight · $(date +%Y-%m-%d)" && git push
